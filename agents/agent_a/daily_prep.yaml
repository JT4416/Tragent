lessons_from_today:
- "Stop loss triggered again with zero open positions entering tomorrow \u2014 discipline\
  \ is working but need to ensure stops are set correctly on entry, not loosened during\
  \ trade."
- "The highest-volume breakouts (CETX 87x, ADVB 49x, ORGO 26x) are the cleanest signals\
  \ \u2014 prioritize extreme volume multiples over moderate ones when selecting trades."
- "Semi sector rotation (MU, INTC, NVDA all +10%+) creates tailwind for AI/tech watchlist\
  \ stocks \u2014 sector momentum matters, align longs with the hot sector of the\
  \ day."
- "Insider selling (NVDA director -221K shares) at levels below current price is a\
  \ red flag even when price action is bullish \u2014 track institutional activity\
  \ against price signals."
- "RSI 94+ (AIXI) is not an entry signal regardless of other confirmations \u2014\
  \ extreme overbought at micro-cap level is almost always a trap for late longs."
user_directive:
  todays_mission: >
    TODAY IS ABOUT PROFIT. Your #1 job is to make money. Not hedge, not wait,
    not analyze endlessly — TRADE and PROFIT.
  price_range_focus: >
    Pay extra attention to stocks in the $2.00 - $20.00 range — they have velocity
    and percentage-move potential. BUT this is NOT a restriction. If INTC is ripping
    14% on massive volume, trade INTC. If MU is the strongest mover, trade MU. The
    best opportunity wins regardless of price. $2-$20 is a sweet spot to watch, not
    a ceiling.
  pre_bell_scan: >
    Before the bell, scan for stocks in the $2-$20 range showing pre-market
    momentum, volume spikes, or positive catalysts. These are your targets.
    Look at post-market earnings movers — any stock that reported after yesterday's
    close and beat/missed expectations could gap hard at open.
  at_the_bell: >
    When the bell rings at 9:30 ET, immediately look at TOP MARKET MOVERS.
    Find what's moving with volume and RIDE THE WAVE. Do not overthink. Do not
    wait for perfect setups. If something in the $2-$20 range is running on real
    volume, get in with a 2.5% trailing stop and let it ride.
  inverse_etf_warning: >
    You are currently holding inverse ETFs (QID, SH, SDS) from a prior bearish
    thesis. If the market opens bullish and your movers are running, consider
    whether these hedges are COSTING you. Dead weight in a bull market is the
    opposite of profit.
  mandate: PROFIT. Not safety. Not hedging. PROFIT.
updated_expertise:
  Market:
    breakout_patterns:
    - pattern: volume_spike_with_range_breakout
      confidence: 0.75
      note: "Volume spike (>20x avg) + 20-day range breakout = strongest combo; 87x\
        \ and 49x examples today reinforce \u2014 extreme volume multiples warrant\
        \ highest conviction"
    - pattern: 52w_high_breakout
      confidence: 0.8
      note: Stocks hitting 52-week highs tend to continue higher if volume confirms
    - pattern: vwap_reclaim
      confidence: 0.5
      note: Price crossing back above VWAP after morning sell-off can signal reversal
    - pattern: sector_momentum_alignment
      confidence: 0.7
      note: "When sector leaders surge (MU +12%, INTC +10%), align longs with sector\
        \ tailwind \u2014 increases base rate of success on individual setups"
    mean_reversion_patterns:
    - pattern: bollinger_squeeze_breakout
      confidence: 0.7
      note: Tight Bollinger Bands + breakout above upper = explosive move; low bandwidth
        = coiled spring
    - pattern: lower_band_rsi_bounce
      confidence: 0.55
      note: "Price at lower BB with RSI < 35 \u2014 oversold bounce setup; needs volume\
        \ confirmation; GBX today is textbook example"
    - pattern: obv_divergence_accumulation
      confidence: 0.62
      note: "Price falling but OBV rising = smart money accumulating; ORGO showed\
        \ this today \u2014 often precedes reversal but requires patience"
    momentum_patterns:
    - pattern: rsi_oversold_bounce
      confidence: 0.6
      note: "RSI below 30 and turning up \u2014 mean reversion play; works best in\
        \ uptrending stocks; ORGO RSI 24->26 with volume spike = textbook"
    - pattern: rsi_overbought_not_sell_signal
      confidence: 0.4
      note: "RSI above 70 is caution, not automatic sell \u2014 but RSI above 90 in\
        \ micro-caps is almost always exhaustion, not continuation"
    - pattern: macd_histogram_flip
      confidence: 0.55
      note: "MACD histogram turning positive after extended negative run \u2014 early\
        \ momentum shift"
    known_false_signals:
    - pattern: micro_cap_volume_spike
      confidence: 0.8
      note: Micro-cap stocks with sudden volume spikes and no news catalyst are often
        pump-and-dump. Avoid unless institutional involvement confirmed.
    - pattern: leveraged_etf_hold_decay
      confidence: 0.9
      note: Leveraged ETFs (SDS, QID) decay over time due to daily rebalancing. Hold
        hours to days only, never weeks.
    - pattern: gap_up_fade
      confidence: 0.5
      note: Many gap-ups fade in first 30 minutes. Wait for first pullback before
        entering. Open blackout exists for this reason.
    - pattern: extreme_rsi_micro_cap_entry
      confidence: 0.85
      note: RSI above 90 in micro-caps (AIXI 94.4 today) is exhaustion signal, not
        momentum entry. Price 600%+ above SMA = parabolic trap for late longs.
    - pattern: insider_sell_against_bullish_signal
      confidence: 0.75
      note: "Director/officer selling overrides bullish technicals \u2014 NVDA director\
        \ sold 221K shares at 172-174 while price at 184; creates overhead supply,\
        \ reduces conviction on longs"
