market_outlook:
  bias: bullish
  reasoning: "Semis surged hard today \u2014 MU +12.4%, INTC +10.3%, NVDA +4.1% \u2014\
    \ on strong sector rotation into AI/tech. Multiple breakout setups across watchlist\
    \ on extreme volume confirm broad risk-on appetite. However, RSI readings are\
    \ extreme on several names; expect some morning chop before continuation."
  key_levels:
  - 'SPY: Watch 540 as near-term support; 550 resistance is the level bulls need to
    reclaim for sustained follow-through'
  - 'QQQ: 460 support; failure below 455 would flip bias to neutral'
  - "NVDA: Director sold 221K shares at ~$173 on March 20 \u2014 insider supply overhead;\
    \ key resistance near $190"
avoid_list:
