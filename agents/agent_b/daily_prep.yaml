lessons_from_today:
- "All 10 decisions today were HOLD \u2014 system is over-filtering. Paper trading\
  \ requires MORE trades at lower confidence to generate learning data. Loosen entry\
  \ bar to 0.40 combined_strength minimum when 2+ signals align on priority watchlist\
  \ names."
- "FCUV printed a near-perfect volume_spike_with_range_breakout setup (0.9 combined\
  \ strength) but was avoided due to micro-cap pump risk. Lesson: establish a tiered\
  \ micro-cap rule \u2014 extreme volume (> 500x) WITH confirmed range breakout earns\
  \ a small position (5% of portfolio max) rather than automatic disqualification."
- "QID and TSLA show opposing forces \u2014 market internals are mixed. When inverse\
  \ ETFs trend up alongside individual stock oversold signals, it indicates sector\
  \ rotation not broad collapse. Weight sector context before directional bias."
- "AAPL insider selling filed after close is actionable intelligence for tomorrow.\
  \ Build a habit of checking Form 4 filings every evening \u2014 institutional and\
  \ insider flow often leads price by 1-2 sessions."
- "ACHR and JOBY both showed bullish MACD flips in the same sector on the same day\
  \ \u2014 correlated sector signals are stronger than single-stock signals. Sector\
  \ confirmation should be a named pattern in the mental model."
