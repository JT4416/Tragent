    Mixed signals with low combined strength (0.537). Avoid until direction resolves.
- symbol: SKYQ
  reason: "Bearish signal direction with RSI 74.3 and price 111% above 50-day SMA.\
    \ Overbought on extended run \u2014 no clean short setup without a clear breakdown\
    \ trigger."
- symbol: SIDU
