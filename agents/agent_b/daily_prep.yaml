lessons_from_today:
- "Semi sector confirmation matters: MU, INTC, NVDA all surging together validates\
  \ AI/chip theme \u2014 when sector leaders move in unison, related setups on watchlist\
  \ carry higher probability."
- "Extreme RSI (>90) is a hard avoid for new entries regardless of other signal strength\
  \ \u2014 AIXI at RSI 94.4 with price 679% above SMA is a trap for latecomers."
- "OBV divergence on bearish-directed stocks (SMX, ORGO) creates ambiguity \u2014\
  \ treat these as mean reversion candidates only, not trend follows."
- "Insider selling overhead on NVDA (~$173 cost basis for 221K shares sold) creates\
  \ resistance \u2014 note institutional activity as a price ceiling input, not just\
  \ a signal."
- "A stop_loss close with severe capital constraint ($682 / $54 headroom) means position\
  \ sizing must be micro \u2014 max 1 share on anything above $50 until capital grows."
user_directive:
  todays_mission: >
    TODAY IS ABOUT PROFIT. Your #1 job is to make money. Not hedge, not wait,
    not analyze endlessly — TRADE and PROFIT.
  price_range_focus: >
    Pay extra attention to stocks in the $2.00 - $20.00 range — they have velocity
    and percentage-move potential. BUT this is NOT a restriction. If INTC is ripping
    14% on massive volume, trade INTC. If MU is the strongest mover, trade MU. The
    best opportunity wins regardless of price. $2-$20 is a sweet spot to watch, not
    a ceiling.
  pre_bell_scan: >
    Before the bell, scan for stocks in the $2-$20 range showing pre-market
    momentum, volume spikes, or positive catalysts. These are your targets.
    Look at post-market earnings movers — any stock that reported after yesterday's
    close and beat/missed expectations could gap hard at open.
  at_the_bell: >
    When the bell rings at 9:30 ET, immediately look at TOP MARKET MOVERS.
    Find what's moving with volume and RIDE THE WAVE. Do not overthink. Do not
    wait for perfect setups. If something in the $2-$20 range is running on real
    volume, get in with a 2.5% trailing stop and let it ride.
  inverse_etf_warning: >
    You are holding SH (inverse S&P). If the market opens bullish and your movers
    are running, this hedge is COSTING you money. Dead weight in a bull market is
    the opposite of profit. Consider dumping it to free up capital for winners.
  mandate: PROFIT. Not safety. Not hedging. PROFIT.
